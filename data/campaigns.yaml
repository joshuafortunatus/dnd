# Every campaign synced from Google Drive. To add a new campaign:
#
#   1. Create (or find) a Google Drive folder for it.
#   2. Share that folder as a Viewer with the sync service account
#      (client_email in your GOOGLE_CREDENTIALS_JSON secret).
#   3. Add an entry below with the folder's ID (from its share URL:
#      https://drive.google.com/drive/folders/<id>) and a slug.
#   4. Scaffold the campaign page: hugo new campaigns/<slug>/_index.md
#      (fill in hero_image with a real image under
#      static/images/campaigns/<slug>/).
#
# That's it — the next sync (daily cron, or `python scripts/sync_drive.py`
# locally) picks up the new folder automatically. Drive folder IDs aren't
# sensitive, so they live here rather than as individual secrets; the
# GOOGLE_CREDENTIALS_JSON service account key is the only real secret.
#
# campaigns:
#   - slug: my-campaign
#     drive_folder_id: "1AbCdEfGhIjKlMnOpQrStUvWxYz"
campaigns:
  - slug: thats-fair
    drive_folder_id: "1CSWY_jJnNacrFx24SII3JAF4g0yupmLs"
