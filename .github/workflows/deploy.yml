name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.163.3"
          extended: true

      - name: Build
        run: hugo --minify

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      # The Pages backend occasionally fails the very first deployment
      # attempt right after a push with a generic "try again later" error
      # (observed consistently on push-triggered runs, not on manual
      # workflow_dispatch reruns). Retry once in-job instead of requiring
      # a manual re-run every time.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 15

      - id: deployment_retry
        name: Retry deploy
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Fail if both attempts failed
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry.outcome == 'failure'
        run: exit 1
